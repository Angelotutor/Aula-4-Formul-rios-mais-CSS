<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Formulário Completo</title>
	<link rel="stylesheet" href="styleexercicio.css" />
  </head>
  <body>
    <form action=# method="POST">
      <div>
        <label for="nome">Nome</label>
        <input type="text" name="nome" id="nome" placeholder="Digite aqui seu nome" required>
      </div>

      <br />

      <div>
        <label for="email">Email</label>
        <input type="email" name="email" id="email" placeholder="Digite aqui seu email" required />
      </div>

      <br />

      <div>
        <label for="senha">Senha</label>
        <input type="password" name="senha" id="senha" placeholder="Digite aqui sua senha" required />
      </div>

      <br />
	  
      <div>
        <label for="cidade">Cidade</label>
        <select name="cidade" id="cidade">
          <option value="Fortaleza">Fortaleza</option>
          <option value="Sao Paulo">São Paulo</option>
		  <option value="Recife">Recife</option>
		  <option value="Rio de Janeiro">Rio de Janeiro</option>
          <option value="naoinformado">Prefiro nao dizer</option>
        </select>
      </div>

      <br />
	  
	   <div>
        <label for="mensagem">Observaçao</label>
        <textarea name="mensagem" id="mensagem" placeholder="Digite sua observação"></textarea>
      </div>

      <button type="submit">Enviar Formulário</button>
    </form>
  </body>
</html>
